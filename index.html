<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kapazitätsplanung</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f8f8f6;color:#1a1a1a;font-size:14px}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:1.25rem 2rem 0;flex-wrap:wrap;gap:10px}
h1{font-size:20px;font-weight:600}
.save-status{font-size:12px;padding:5px 12px;border-radius:6px;transition:opacity .3s}
.save-status.saved{background:#f0f8ea;color:#3a6010;border:1px solid #c0dc90}
.save-status.saving{background:#fff8ec;color:#8a5500;border:1px solid #f0d090}
.save-status.error{background:#fef0f0;color:#8a0000;border:1px solid #f0c0c0}
.save-status.hidden{opacity:0;pointer-events:none}
.team-bar{display:flex;gap:8px;padding:1rem 2rem 0}
.team-btn{padding:7px 18px;font-size:13px;font-weight:600;border:1.5px solid #ddd;border-radius:8px;background:#fff;color:#888;cursor:pointer;transition:all .15s}
.team-btn:hover{border-color:#aaa;color:#444}
.team-btn.active.dotnet{border-color:#378ADD;background:#e6f1fb;color:#0c447c}
.team-btn.active.php{border-color:#7F77DD;background:#eeedfe;color:#3c3489}
.tab-nav{display:flex;padding:.75rem 2rem 0;border-bottom:1px solid #e8e8e4;margin-top:.25rem}
.tab-btn{padding:8px 18px;font-size:13px;font-weight:500;border:none;background:transparent;color:#888;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s}
.tab-btn:hover{color:#444}
.tab-btn.active{color:#1a1a1a;border-bottom-color:#1a1a1a}
.tab-content{display:none;padding:1.25rem 2rem 2rem}
.tab-content.active{display:block}
.card{background:#fff;border:1px solid #e8e8e4;border-radius:10px;padding:14px 16px;margin-bottom:10px}
.card-header{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap}
input,select{padding:5px 9px;font-size:13px;border:1px solid #ddd;border-radius:6px;background:#fafaf8;color:#1a1a1a;outline:none;transition:border-color .15s}
input:focus,select:focus{border-color:#378ADD;background:#fff}
input[type=number]{width:60px}
input[type=date]{width:138px}
input[type=color]{width:32px;height:28px;padding:2px;cursor:pointer;border-radius:4px}
input[type=text]{width:160px}
.name-input{font-size:14px;font-weight:600;background:transparent;border-color:transparent;width:180px}
.name-input:hover,.name-input:focus{background:#fafaf8;border-color:#ddd}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;font-size:12px;border:1px solid #ddd;border-radius:7px;background:#fff;color:#444;cursor:pointer;transition:background .15s}
.btn:hover{background:#f0f0ec}
.btn-sm{padding:4px 10px;font-size:11px}
.btn-add{border-color:#c0dc90;color:#3a6010;background:#f8fbf4}
.btn-add:hover{background:#f0f8ea}
.del{background:none;border:none;cursor:pointer;color:#ccc;font-size:16px;padding:2px 6px;border-radius:4px;line-height:1;transition:color .15s}
.del:hover{color:#e24b4a}
.avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:500}
.badge-ok{background:#f0f8ea;color:#3a6010;border:1px solid #c0dc90}
.badge-warn{background:#fff8ec;color:#8a5500;border:1px solid #f0d090}
.badge-over{background:#fef0f0;color:#8a0000;border:1px solid #f0c0c0}

/* Gantt */
.gantt-wrap{overflow-x:auto;margin-bottom:1.5rem}
.g-hdr{display:grid;margin-bottom:2px}
.g-row{display:grid;align-items:center;margin-bottom:3px}
.g-lbl{font-size:11px;color:#888;padding-right:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.g-wk-hdr{font-size:9px;text-align:center;border-left:1px solid #e8e8e4;padding:3px 1px;line-height:1.4;overflow:hidden;background:#fafaf8}
.g-wk-hdr .wk-mo{font-weight:600;color:#444}
.g-wk-hdr .wk-fr{color:#aaa}
.g-cell{height:22px;border-left:1px solid #ebebea;position:relative;overflow:hidden}
.g-block{position:absolute;top:1px;left:1px;right:1px;bottom:1px;border-radius:3px;display:flex;align-items:center;padding:0 5px;font-size:10px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.g-off{position:absolute;top:1px;bottom:1px;left:1px;border-radius:3px;background:repeating-linear-gradient(45deg,transparent,transparent 3px,rgba(0,0,0,.09) 3px,rgba(0,0,0,.09) 6px)}
.g-deadline{position:absolute;top:0;bottom:0;width:2px;background:#e24b4a;z-index:2}
.g-deadline-lbl{position:absolute;top:-14px;font-size:9px;color:#e24b4a;font-weight:600;white-space:nowrap;transform:translateX(-50%)}
.g-sep{font-size:11px;font-weight:600;color:#444;padding:10px 0 3px;border-bottom:1px solid #e4e4e0;margin-bottom:4px;display:flex;align-items:center;gap:7px}
.gantt-toggle{display:flex;border:1px solid #ddd;border-radius:7px;overflow:hidden;width:fit-content;margin-bottom:.75rem}
.gantt-toggle-btn{padding:6px 16px;font-size:12px;border:none;border-right:1px solid #ddd;background:#fff;color:#666;cursor:pointer;transition:all .15s}
.gantt-toggle-btn:last-child{border-right:none}
.gantt-toggle-btn.active{background:#1a1a1a;color:#fff}
.range-row{display:flex;align-items:center;gap:8px;margin-bottom:.75rem;flex-wrap:wrap}
.legend{display:flex;gap:12px;margin-bottom:.75rem;flex-wrap:wrap;align-items:center;font-size:12px;color:#888}
.legend-hatch{width:12px;height:12px;border-radius:2px;background:repeating-linear-gradient(45deg,transparent,transparent 3px,rgba(0,0,0,.12) 3px,rgba(0,0,0,.12) 6px);border:1px solid #ddd;display:inline-block}
.legend-dl{width:2px;height:12px;background:#e24b4a;display:inline-block}
.util-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px}
.util-card{background:#fff;border:1px solid #e8e8e4;border-radius:8px;padding:10px 12px}
.bar-wrap{height:5px;background:#f0f0ec;border-radius:3px;overflow:hidden;margin:5px 0;border:1px solid #e8e8e4}
.bar-fill{height:100%;border-radius:3px;transition:width .3s}

/* Mini calendar */
.cal-nav{display:flex;align-items:center;gap:6px;margin-bottom:5px}
.cal-nav button{background:none;border:1px solid #ddd;border-radius:4px;padding:1px 7px;cursor:pointer;font-size:12px;color:#666}
.cal-nav button:hover{background:#f0f0ec}
.cal-nav span{font-size:12px;font-weight:600;color:#444;min-width:90px;text-align:center}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;max-width:240px}
.cal-day-hdr{font-size:10px;color:#aaa;text-align:center;padding:2px 0;font-weight:600}
.cal-day{font-size:11px;text-align:center;padding:3px 2px;border-radius:3px;cursor:pointer;border:1px solid transparent;line-height:1.4}
.cal-day:hover:not(.cal-other):not(.cal-weekend){background:#f0f0ec;border-color:#ddd}
.cal-day.cal-blocked{background:#fff8ec;border-color:#f0a040;color:#8a5500;font-weight:600}
.cal-day.cal-weekend{color:#e0e0da;cursor:default}
.cal-day.cal-other{color:#e0e0da;cursor:default}
.cal-day.cal-today{border-color:#378ADD;color:#0c447c;font-weight:600}
.abs-tags{display:flex;flex-wrap:wrap;gap:3px;margin-top:5px}
.abs-tag{display:inline-flex;align-items:center;gap:3px;padding:2px 6px;background:#fff8ec;border:1px solid #f0a040;border-radius:3px;font-size:11px;color:#8a5500}
.abs-tag button{background:none;border:none;cursor:pointer;color:#f0a040;font-size:12px;line-height:1;padding:0}
.abs-tag button:hover{color:#e24b4a}

/* Weekly hours matrix */
.wh-table{width:100%;border-collapse:collapse;margin-top:6px;font-size:12px}
.wh-table th{font-size:10px;font-weight:600;color:#666;text-align:center;padding:4px 2px;border-bottom:1px solid #f0f0ec;white-space:nowrap;min-width:72px;line-height:1.4}
.wh-table th.wh-proj-hdr{text-align:left;color:#888;min-width:120px;padding-left:0}
.wh-table td{padding:3px 2px;text-align:center;border-bottom:1px solid #f8f8f6;vertical-align:middle}
.wh-table td.wh-proj-name{text-align:left;padding-left:0;padding-right:8px}
.wh-table tr:last-child td{border-bottom:none}
.wh-input{width:46px;padding:3px 4px;font-size:12px;text-align:center;border:1px solid #eee;border-radius:4px;background:#fafaf8;color:#1a1a1a}
.wh-input:focus{border-color:#378ADD;background:#fff;outline:none}
.wh-input.has-val{border-color:#b5d4f4;background:#f0f7ff;color:#0c447c;font-weight:500}
.wh-input.overloaded{border-color:#f0c0c0;background:#fff5f5;color:#8a0000}
.wh-cap-row td{font-size:11px;color:#888;padding-top:6px;border-top:1px solid #f0f0ec;border-bottom:none}
.wh-cap-cell{font-weight:500}
.wh-cap-ok{color:#3a9e60}
.wh-cap-warn{color:#f0a030}
.wh-cap-over{color:#e24b4a}
.sec-label{font-size:11px;font-weight:600;color:#aaa;text-transform:uppercase;letter-spacing:.05em;margin:14px 0 6px}
.loading{text-align:center;padding:4rem;color:#aaa}
.fl{font-size:11px;color:#888}
</style>
</head>
<body>

<div class="topbar">
  <h1>Kapazitätsplanung</h1>
  <span class="save-status hidden" id="saveStatus"></span>
</div>

<div class="team-bar">
  <button class="team-btn active dotnet" id="tbtn-dotnet" onclick="switchTeam('dotnet')">.NET</button>
  <button class="team-btn" id="tbtn-php" onclick="switchTeam('php')">PHP</button>
</div>

<div class="tab-nav">
  <button class="tab-btn active" id="tabnav-gantt" onclick="switchTab('gantt')">Gantt</button>
  <button class="tab-btn" id="tabnav-projekte" onclick="switchTab('projekte')">Projekte</button>
  <button class="tab-btn" id="tabnav-entwickler" onclick="switchTab('entwickler')">Entwickler</button>
</div>

<div id="tab-gantt" class="tab-content active"><div class="loading">Verbinde mit Datenbank...</div></div>
<div id="tab-projekte" class="tab-content"></div>
<div id="tab-entwickler" class="tab-content"></div>

<script>
const SUPABASE_URL='https://ongnohzbwmyhnfqezjty.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9uZ25vaHpid215aG5mcWV6anR5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3MjE2NzcsImV4cCI6MjA5MTI5NzY3N30.BklaGJPl2RtOr9RR2DRTYnQPhvHlNj58ITC_XtcxR8Q';
const HDRS={'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`,'Prefer':'return=minimal'};
const SBURL=t=>`${SUPABASE_URL}/rest/v1/kapplan?id=eq.${t}`;

const COLORS=['#378ADD','#1D9E75','#D85A30','#D4537E','#7F77DD','#BA7517','#639922','#185FA5'];
const AVT_BG=['#dbeeff','#d0f5e8','#fdecd8','#fce4ef','#eae8fd','#fcebd0'];
const AVT_TX=['#0a4080','#0a5535','#7a3800','#7a1840','#3a2888','#7a4000'];
const TEAM_META={dotnet:{label:'.NET',cls:'dotnet'},php:{label:'PHP',cls:'php'}};
const DAY_NAMES=['Mo','Di','Mi','Do','Fr','Sa','So'];

// ── Date helpers ──────────────────────────────────────────────────────────────
function today(){return toStr(new Date())}
function toStr(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function fromStr(s){const p=s.trim().split('-');return new Date(parseInt(p[0]),parseInt(p[1])-1,parseInt(p[2]))}
function addDays(s,n){const d=fromStr(s);d.setDate(d.getDate()+n);return toStr(d)}
function addWeeks(s,n){return addDays(s,n*7)}
function diffDays(a,b){return Math.round((fromStr(b)-fromStr(a))/86400000)}
function fmtD(s){const d=fromStr(s);return d.getDate()+'.'+(d.getMonth()+1)+'.'}
function fmtFull(s){return fromStr(s).toLocaleDateString('de-AT',{day:'2-digit',month:'2-digit',year:'numeric'})}
function fmtMY(y,m){return['Jän','Feb','Mär','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'][m]+' '+y}
function weekStart(s){const d=fromStr(s);const day=d.getDay();d.setDate(d.getDate()-(day===0?6:day-1));return toStr(d)}
function weeksBetween(a,b){const w=[];let c=weekStart(a);while(c<=b){w.push(c);c=addWeeks(c,1);}return w}
function getKW(s){
  const d=fromStr(s);
  const jan4=new Date(d.getFullYear(),0,4);
  const startOfWeek1=new Date(jan4);
  startOfWeek1.setDate(jan4.getDate()-(jan4.getDay()===0?6:jan4.getDay()-1));
  const diff=Math.round((d-startOfWeek1)/86400000);
  const kw=Math.floor(diff/7)+1;
  if(kw<1){return getKW(toStr(new Date(d.getFullYear()-1,11,28)));}
  if(kw>52){const nextJan4=new Date(d.getFullYear()+1,0,4);const nextStart=new Date(nextJan4);nextStart.setDate(nextJan4.getDate()-(nextJan4.getDay()===0?6:nextJan4.getDay()-1));if(d>=nextStart)return 1;}
  return kw;
}

// ── Absence helpers ───────────────────────────────────────────────────────────
function getAbs(dev){if(!dev.absences)dev.absences=[];return dev.absences}
function absFrac(wStart,abs){
  if(!abs||!abs.length)return 0;
  let n=0;for(let i=0;i<5;i++){if(abs.some(a=>a.trim()===addDays(wStart,i)))n++;}
  return n/5;
}

// ── Weekly hours helpers ──────────────────────────────────────────────────────
// weeklyHours stored per assignment as {devId, startDate, endDate, weeklyHours:{wStart:h,...}}
function getWH(asgn,wStart){return(asgn.weeklyHours&&asgn.weeklyHours[wStart])||0}
function setWH(asgn,wStart,v){if(!asgn.weeklyHours)asgn.weeklyHours={};if(v===0||v===null)delete asgn.weeklyHours[wStart];else asgn.weeklyHours[wStart]=v;}
// get hours for a dev+project in a given week (sum across all their assignments to that project)
function devProjHoursInWeek(dev,proj,wStart){
  let h=0;
  proj.assignments.filter(a=>a.devId===dev.id).forEach(a=>{
    const wEnd=addDays(wStart,6);
    if(a.startDate<=wEnd&&a.endDate>=wStart) h+=getWH(a,wStart);
  });
  return h;
}
// total hours dev works in a given week across all projects
function devTotalHoursInWeek(dev,projects,wStart){
  let h=0;
  projects.forEach(p=>p.assignments.filter(a=>a.devId===dev.id).forEach(a=>{
    const wEnd=addDays(wStart,6);
    if(a.startDate<=wEnd&&a.endDate>=wStart) h+=getWH(a,wStart);
  }));
  return h;
}
// effective capacity considering absences
function effectiveCap(dev,wStart){return Math.round(dev.cap*(1-absFrac(wStart,getAbs(dev))))}

// ── Default data ──────────────────────────────────────────────────────────────
function mkDefault(label){
  const s=addWeeks(today(),1);
  return{devs:[
    {id:1,name:label+' Dev 1',cap:40,absences:[],color:AVT_BG[0],ctxt:AVT_TX[0]},
    {id:2,name:label+' Dev 2',cap:32,absences:[],color:AVT_BG[1],ctxt:AVT_TX[1]},
  ],projects:[
    {id:1,name:'Beispielprojekt',color:'#378ADD',deadline:'',totalHours:0,
     assignments:[{devId:1,startDate:s,endDate:addWeeks(s,6),weeklyHours:{}}]},
  ],dc:10,pc:10,ganttStart:today(),ganttEnd:addWeeks(today(),12)};
}

// ── State ─────────────────────────────────────────────────────────────────────
const teams={dotnet:null,php:null};
const ganttViews={dotnet:'dev',php:'dev'};
let activeTeam='dotnet',saveTimers={};
const calState={};

function td(){return teams[activeTeam]}
function devById(id){return td().devs.find(d=>d.id===id)}
function projById(id){return td().projects.find(p=>p.id===id)}
function initials(n){return n.split(' ').map(x=>x[0]||'').join('').toUpperCase().slice(0,2)||'?'}
function getCalState(did){if(!calState[did]){const n=new Date();calState[did]={y:n.getFullYear(),m:n.getMonth()}}return calState[did]}

// ── Supabase ──────────────────────────────────────────────────────────────────
async function loadTeam(team){
  try{
    const res=await fetch(SBURL(team),{headers:HDRS});
    const rows=await res.json();
    if(!res.ok)throw new Error(rows.message||'Fehler');
    const d=rows.length>0&&rows[0].data&&Object.keys(rows[0].data).length>0?rows[0].data:mkDefault(TEAM_META[team].label);
    if(!d.ganttStart)d.ganttStart=today();
    if(!d.ganttEnd)d.ganttEnd=addWeeks(today(),12);
    // migrate old hpw → weeklyHours
    d.devs.forEach(dev=>{if(!dev.absences)dev.absences=[];});
    d.projects.forEach(p=>{
      p.assignments.forEach(a=>{
        if(!a.weeklyHours)a.weeklyHours={};
        if(a.hpw&&Object.keys(a.weeklyHours).length===0){
          // spread old fixed hpw across all active weeks
          weeksBetween(a.startDate,a.endDate).forEach(w=>{a.weeklyHours[w]=a.hpw;});
          delete a.hpw;
        }
      });
    });
    teams[team]=d;
  }catch(e){teams[team]=mkDefault(TEAM_META[team].label);showStatus('error','Ladefehler: '+e.message);}
}
async function loadAll(){
  document.getElementById('tab-gantt').innerHTML='<div class="loading">Verbinde mit Datenbank...</div>';
  await Promise.all([loadTeam('dotnet'),loadTeam('php')]);
  renderAll();
}
function scheduleSave(team){clearTimeout(saveTimers[team]);showStatus('saving','...');saveTimers[team]=setTimeout(()=>doSave(team),400);}
async function doSave(team){
  try{
    const payload=JSON.stringify({data:teams[team],updated_at:new Date().toISOString()});
    const res=await fetch(SBURL(team),{method:'PATCH',headers:HDRS,body:payload});
    if(res.status===404||res.status===406){
      const ins=await fetch(`${SUPABASE_URL}/rest/v1/kapplan`,{method:'POST',headers:{...HDRS,'Prefer':'return=minimal'},body:JSON.stringify({id:team,data:teams[team],updated_at:new Date().toISOString()})});
      if(!ins.ok){const e=await ins.json();throw new Error(e.message||ins.status)}
    }else if(!res.ok){const e=await res.json();throw new Error(e.message||res.status)}
    showStatus('saved','Gespeichert');setTimeout(()=>showStatus('hidden',''),1500);
  }catch(e){showStatus('error','Fehler: '+e.message);}
}
async function saveNow(team){clearTimeout(saveTimers[team]);await doSave(team);}
function showStatus(t,m){const el=document.getElementById('saveStatus');el.className='save-status '+t;el.textContent=m;}

// ── Navigation ────────────────────────────────────────────────────────────────
function switchTeam(team){
  activeTeam=team;
  Object.keys(TEAM_META).forEach(t=>{document.getElementById('tbtn-'+t).className='team-btn'+(t===team?' active '+TEAM_META[t].cls:'');});
  renderAll();
}
function switchTab(tab){
  ['gantt','projekte','entwickler'].forEach(t=>{
    document.getElementById('tabnav-'+t).className='tab-btn'+(t===tab?' active':'');
    document.getElementById('tab-'+t).className='tab-content'+(t===tab?' active':'');
  });
}
function setGanttView(v){ganttViews[activeTeam]=v;renderGanttTab();}

// ── Gantt ─────────────────────────────────────────────────────────────────────
function renderGanttTab(){
  const gv=ganttViews[activeTeam];const d=td();
  document.getElementById('tab-gantt').innerHTML=`
    <div class="range-row">
      <span class="fl">Zeitraum:</span>
      <input type="date" value="${d.ganttStart}" onchange="td().ganttStart=this.value;renderGanttTab();scheduleSave(activeTeam)">
      <span class="fl">–</span>
      <input type="date" value="${d.ganttEnd}" onchange="td().ganttEnd=this.value;renderGanttTab();scheduleSave(activeTeam)">
    </div>
    <div class="gantt-toggle">
      <button class="gantt-toggle-btn${gv==='dev'?' active':''}" onclick="setGanttView('dev')">Nach Entwickler</button>
      <button class="gantt-toggle-btn${gv==='proj'?' active':''}" onclick="setGanttView('proj')">Nach Projekt</button>
    </div>
    <div class="legend">
      <span><span class="legend-hatch"></span> Abwesend</span>
      <span><span class="legend-dl"></span> Deadline</span>
      <span style="color:#aaa">Balkenhöhe = Auslastung</span>
    </div>
    <div class="gantt-wrap"><div id="gantt"></div></div>
    <div class="sec-label">Auslastung</div>
    <div class="util-grid" id="utilGrid"></div>`;
  renderGantt();renderUtil();
}

function buildGrid(){
  const d=td();const weeks=weeksBetween(d.ganttStart,d.ganttEnd);
  const labelW=130;const cw=Math.max(54,Math.floor((Math.max(620,window.innerWidth-100)-labelW)/weeks.length));
  return{weeks,cols:`${labelW}px ${weeks.map(()=>cw+'px').join(' ')}`};
}
function ganttHdr(g){
  return`<div class="g-hdr" style="grid-template-columns:${g.cols}"><div></div>${g.weeks.map(w=>`<div class="g-wk-hdr"><div class="wk-mo">${fmtD(w)}</div><div class="wk-fr">${fmtD(addDays(w,4))}</div></div>`).join('')}</div>`;
}
function absSegments(wStart,abs){
  // Returns HTML for per-day absence segments: Mo=0-20%, Di=20-40%, etc.
  if(!abs||!abs.length)return'';
  let html='';
  for(let i=0;i<5;i++){
    if(abs.some(a=>a.trim()===addDays(wStart,i))){
      const left=i*20;
      html+=`<div style="position:absolute;top:1px;bottom:1px;left:${left}%;width:20%;background:repeating-linear-gradient(45deg,transparent,transparent 3px,rgba(0,0,0,.12) 3px,rgba(0,0,0,.12) 6px);z-index:2;pointer-events:none"></div>`;
    }
  }
  return html;
}
function ganttCell(wStart,startDate,endDate,color,label,isFirst,abs,dlDate,hpw,cap){
  const wEnd=addDays(wStart,6);
  const frac=absFrac(wStart,abs||[]);
  const overlap=startDate<=wEnd&&endDate>=wStart;
  let dl='';
  if(dlDate&&dlDate>=wStart&&dlDate<=wEnd){
    const pct=Math.min(100,Math.round(diffDays(wStart,dlDate)/7*100));
    dl=`<div class="g-deadline" style="left:${pct}%"><div class="g-deadline-lbl">${fmtD(dlDate)}</div></div>`;
  }
  const segs=absSegments(wStart,abs);
  if(overlap){
    if(frac===1)return`<div class="g-cell">${dl}${segs}</div>`;
    const heightPct=cap>0&&hpw>0?Math.max(0.18,Math.min(1,hpw/cap)):1;
    const barH=Math.round(heightPct*18);
    const barTop=Math.round((20-barH)/2);
    const tooltip=hpw>0&&cap>0?` title="${hpw}h / ${cap}h Kapazität"`:'';
    return`<div class="g-cell">${dl}<div class="g-block"${tooltip} style="background:${color}22;border:1.5px solid ${color};color:${color};top:${barTop}px;height:${barH}px;bottom:auto">${isFirst?label:''}</div>${segs}</div>`;
  }
  if(segs)return`<div class="g-cell">${dl}${segs}</div>`;
  return`<div class="g-cell">${dl}</div>`;
}
function ganttRow(g,label,startDate,endDate,color,rlabel,abs,dlDate,getHpwFn,cap){
  const cells=g.weeks.map(w=>{
    const hpw=getHpwFn?getHpwFn(w):0;
    return ganttCell(w,startDate,endDate,color,rlabel,startDate>=w&&startDate<=addDays(w,6),abs,dlDate,hpw,cap);
  }).join('');
  return`<div class="g-row" style="grid-template-columns:${g.cols}"><div class="g-lbl">${label}</div>${cells}</div>`;
}
function ganttByDev(g,devs,projects){
  let h=ganttHdr(g);
  devs.forEach(dev=>{
    h+=`<div class="g-sep"><span style="width:9px;height:9px;border-radius:50%;background:${dev.color};display:inline-block;flex-shrink:0"></span>${dev.name} <span style="font-weight:400;color:#aaa;font-size:10px">${dev.cap}h/Wo</span></div>`;
    const dp=projects.filter(p=>p.assignments.some(a=>a.devId===dev.id));
    if(!dp.length){
      const cells=g.weeks.map(w=>{const segs=absSegments(w,dev.absences);return`<div class="g-cell">${segs}</div>`;}).join('');
      h+=`<div class="g-row" style="grid-template-columns:${g.cols}"><div class="g-lbl" style="font-style:italic;color:#ccc">keine Projekte</div>${cells}</div>`;
      return;
    }
    dp.forEach(proj=>{
      proj.assignments.filter(a=>a.devId===dev.id).forEach(a=>{
        const getHpw=w=>getWH(a,w);
        h+=ganttRow(g,proj.name,a.startDate,a.endDate,proj.color,proj.name,dev.absences,proj.deadline||null,getHpw,dev.cap);
      });
    });
  });
  return h;
}
function ganttByProj(g,devs,projects){
  let h=ganttHdr(g);
  projects.forEach(proj=>{
    const dl=proj.deadline?` <span style="font-size:10px;color:#e24b4a;font-weight:400">${fmtFull(proj.deadline)}</span>`:'';
    h+=`<div class="g-sep"><span style="width:9px;height:9px;border-radius:50%;background:${proj.color};display:inline-block;flex-shrink:0"></span>${proj.name}${dl}</div>`;
    if(!proj.assignments.length){h+=`<div class="g-row" style="grid-template-columns:${g.cols}"><div class="g-lbl" style="font-style:italic;color:#ccc">keine Zuweisung</div>${g.weeks.map(()=>'<div class="g-cell"></div>').join('')}</div>`;return;}
    proj.assignments.forEach(a=>{
      const dev=devs.find(d=>d.id===a.devId);if(!dev)return;
      const lbl=`<span style="display:inline-flex;align-items:center;gap:4px"><span style="width:7px;height:7px;border-radius:50%;background:${dev.color};display:inline-block"></span>${dev.name}</span>`;
      const getHpw=w=>getWH(a,w);
      h+=ganttRow(g,lbl,a.startDate,a.endDate,proj.color,dev.name,dev.absences,proj.deadline||null,getHpw,dev.cap);
    });
  });
  return h;
}
function renderGantt(){
  const g=buildGrid();const d=td();
  document.getElementById('gantt').innerHTML=ganttViews[activeTeam]==='dev'?ganttByDev(g,d.devs,d.projects):ganttByProj(g,d.devs,d.projects);
}
function renderUtil(){
  const d=td();const weeks=weeksBetween(d.ganttStart,d.ganttEnd);
  document.getElementById('utilGrid').innerHTML=d.devs.map(dev=>{
    const wLoads=weeks.map(w=>({cap:effectiveCap(dev,w),load:devTotalHoursInWeek(dev,d.projects,w)}));
    const active=wLoads.filter(w=>w.load>0);
    const avg=active.length?Math.round(active.reduce((s,w)=>s+w.load,0)/active.length):0;
    const max=Math.max(...wLoads.map(w=>w.load),0);
    const pct=dev.cap>0?Math.min(Math.round(avg/dev.cap*100),200):0;
    const col=pct>100?'#e24b4a':pct>80?'#f0a030':'#3a9e60';
    const over=wLoads.some(w=>w.load>w.cap&&w.cap>0);
    const absCnt=getAbs(dev).filter(d=>d>=td().ganttStart&&d<=td().ganttEnd).length;
    return`<div class="util-card">
      <div style="display:flex;align-items:center;gap:7px;margin-bottom:5px">
        <div class="avatar" style="background:${dev.color};color:${dev.ctxt};width:26px;height:26px;font-size:10px;flex-shrink:0">${initials(dev.name)}</div>
        <span style="font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${dev.name}</span>
      </div>
      <div class="bar-wrap"><div class="bar-fill" style="width:${Math.min(pct,100)}%;background:${col}"></div></div>
      <div style="display:flex;justify-content:space-between;font-size:11px;color:#888">
        <span>Ø ${avg}h/Wo</span><span style="font-weight:600;color:${col}">${pct}%</span>
      </div>
      <div style="font-size:10px;color:#bbb;margin-top:2px">Max ${max}h${absCnt?` · ${absCnt}d abw.`:''}</div>
      <div style="font-size:10px;margin-top:4px;padding:3px 6px;border-radius:4px;${over?'background:#fef0f0;color:#8a0000;border:1px solid #f0c0c0':'background:#f0f8ea;color:#3a6010;border:1px solid #c0dc90'}">${over?'Überlastung in mind. 1 Woche':'OK'}</div>
    </div>`;
  }).join('');
}

// ── Projekte Tab ──────────────────────────────────────────────────────────────
function dlBadge(dl){
  if(!dl)return'';
  const diff=diffDays(today(),dl);
  const cls=diff<0?'badge-over':diff<=14?'badge-warn':'badge-ok';
  const txt=diff<0?`${Math.abs(diff)}d überfällig`:diff===0?'heute':diff<=14?`${diff}d`:fmtFull(dl);
  return`<span class="badge ${cls}">${txt}</span>`;
}
function renderProjTab(){
  const t=td();
  document.getElementById('tab-projekte').innerHTML=t.projects.map(p=>{
    // compute total allocated hours across all assignments
    let allocTotal=0;
    p.assignments.forEach(a=>{Object.values(a.weeklyHours||{}).forEach(h=>allocTotal+=h);});
    const coverBar=p.totalHours>0?`
      <div style="margin-top:10px;padding-top:10px;border-top:0.5px solid #f0f0ec">
        <div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px">
          <span style="color:#888">Stunden zugeteilt</span>
          <span style="font-weight:600;color:${allocTotal<p.totalHours?'#e24b4a':allocTotal>p.totalHours?'#f0a030':'#3a9e60'}">${allocTotal} / ${p.totalHours}h</span>
        </div>
        <div style="height:4px;background:#f0f0ec;border-radius:3px;overflow:hidden">
          <div style="height:100%;width:${Math.min(100,Math.round(allocTotal/p.totalHours*100))}%;background:${allocTotal<p.totalHours?'#e24b4a':allocTotal>p.totalHours?'#f0a030':'#3a9e60'};border-radius:3px"></div>
        </div>
        ${allocTotal<p.totalHours?`<div style="font-size:11px;color:#e24b4a;margin-top:3px">${p.totalHours-allocTotal}h noch nicht zugeteilt</div>`:allocTotal>p.totalHours?`<div style="font-size:11px;color:#f0a030;margin-top:3px">${allocTotal-p.totalHours}h mehr als geplant</div>`:''}
      </div>`:'';
    const aRows=p.assignments.map((a,ai)=>`
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding:7px 0;border-top:0.5px solid #f4f4f2">
        <select onchange="pasgn(${p.id},${ai},'devId',+this.value)" style="flex:1;min-width:120px">${devOpts(a.devId)}</select>
        <input type="date" value="${a.startDate}" onchange="pasgn(${p.id},${ai},'startDate',this.value)">
        <span class="fl">–</span>
        <input type="date" value="${a.endDate}" onchange="pasgn(${p.id},${ai},'endDate',this.value)">
        <button class="del" onclick="rmAsgn(${p.id},${ai})">×</button>
      </div>`).join('');
    return`<div class="card">
      <div class="card-header">
        <input type="color" value="${p.color}" onchange="projById(${p.id}).color=this.value;saveAndRender()">
        <input type="text" class="name-input" value="${p.name}" onchange="projById(${p.id}).name=this.value;saveAndRender()">
        <div style="display:flex;align-items:center;gap:6px;margin-left:auto">
          <span class="fl">Geplant:</span>
          <input type="number" min="0" value="${p.totalHours||''}" placeholder="–" onchange="projById(${p.id}).totalHours=+this.value||0;saveAndRenderNow()" style="width:72px">
          <span class="fl">h</span>
          <span class="fl" style="margin-left:4px">Deadline:</span>
          <input type="date" value="${p.deadline||''}" onchange="projById(${p.id}).deadline=this.value||'';saveAndRenderNow()">
          ${dlBadge(p.deadline)}
        </div>
        <button class="del" onclick="td().projects=td().projects.filter(x=>x.id!=${p.id});saveAndRenderNow()">×</button>
      </div>
      ${aRows.length?`<div style="font-size:11px;color:#aaa;padding-bottom:4px;border-bottom:0.5px solid #f0f0ec">Entwickler &nbsp;·&nbsp; Zeitraum</div>${aRows}`:'<div style="font-size:12px;color:#ccc;padding:4px 0">Noch keine Zuweisung</div>'}
      <button class="btn btn-sm btn-add" style="margin-top:8px" onclick="addAsgn(${p.id})">+ Entwickler zuweisen</button>
      ${coverBar}
    </div>`;
  }).join('')+`<button class="btn btn-add" onclick="addProj()" style="margin-top:4px">+ Projekt</button>`;
}
function devOpts(sel){return td().devs.map(d=>`<option value="${d.id}"${d.id===sel?' selected':''}>${d.name}</option>`).join('')}

// ── Entwickler Tab ────────────────────────────────────────────────────────────
function renderMiniCal(devId){
  const dev=devById(devId);if(!dev)return'';
  const abs=getAbs(dev);const cs=getCalState(devId);const{y,m}=cs;
  const firstDay=new Date(y,m,1);const lastDay=new Date(y,m+1,0);
  const startDow=firstDay.getDay()===0?6:firstDay.getDay()-1;
  const todayStr=today();let cells='';
  for(let i=0;i<startDow;i++)cells+=`<div class="cal-day cal-other"></div>`;
  for(let day=1;day<=lastDay.getDate();day++){
    const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const dow=new Date(y,m,day).getDay();const isWe=dow===0||dow===6;
    const isAbs=abs.includes(ds);const isTod=ds===todayStr;
    let cls='cal-day';
    if(isWe)cls+=' cal-weekend';else if(isAbs)cls+=' cal-blocked';
    if(isTod&&!isWe)cls+=' cal-today';
    cells+=`<div class="${cls}"${isWe?'':` onclick="toggleAbs(${devId},'${ds}')"`}>${day}</div>`;
  }
  const sorted=[...abs].sort();
  const tags=sorted.map(d=>`<span class="abs-tag">${fmtFull(d)}<button onclick="toggleAbs(${devId},'${d}')">×</button></span>`).join('');
  return`<div style="margin-top:12px;padding-top:12px;border-top:0.5px solid #f0f0ec">
    <div class="sec-label" style="margin-top:0">Abwesenheiten</div>
    <div class="cal-nav">
      <button onclick="calPrev(${devId})">‹</button>
      <span>${fmtMY(y,m)}</span>
      <button onclick="calNext(${devId})">›</button>
    </div>
    <div class="cal-grid">
      ${DAY_NAMES.map(n=>`<div class="cal-day-hdr">${n}</div>`).join('')}${cells}
    </div>
    ${sorted.length?`<div class="abs-tags" style="margin-top:5px">${tags}</div>`:''}
  </div>`;
}

function renderWeeklyMatrix(dev){
  const t=td();
  const myProjs=t.projects.filter(p=>p.assignments.some(a=>a.devId===dev.id));
  if(!myProjs.length)return`<div style="font-size:12px;color:#ccc;font-style:italic;margin-top:8px">Keine Projekte zugewiesen</div>`;

  // only show weeks where at least one assignment is active
  const allWeeks=weeksBetween(t.ganttStart,t.ganttEnd);
  const activeWeeks=allWeeks.filter(w=>{
    const wEnd=addDays(w,6);
    return myProjs.some(p=>p.assignments.filter(a=>a.devId===dev.id).some(a=>a.startDate<=wEnd&&a.endDate>=w));
  });
  if(!activeWeeks.length)return`<div style="font-size:12px;color:#ccc;font-style:italic;margin-top:8px">Kein aktiver Zeitraum im Gantt-Fenster</div>`;

  const hdrCells=activeWeeks.map(w=>`<th title="Mo ${fmtFull(w)} – Fr ${fmtFull(addDays(w,4))}">KW${getKW(w)}<br><span style="font-weight:400;color:#bbb">${fmtD(w)}–${fmtD(addDays(w,4))}</span></th>`).join('');

  const projRows=myProjs.map(p=>{
    const asgns=p.assignments.filter(a=>a.devId===dev.id);
    const cells=activeWeeks.map(w=>{
      const wEnd=addDays(w,6);
      const asgn=asgns.find(a=>a.startDate<=wEnd&&a.endDate>=w);
      if(!asgn)return`<td><span style="color:#e0e0da;font-size:11px">–</span></td>`;
      const v=getWH(asgn,w);
      const ai=p.assignments.indexOf(asgn);
      const eff=effectiveCap(dev,w);
      const totalThisWeek=devTotalHoursInWeek(dev,t.projects,w);
      const isOver=totalThisWeek>eff&&eff>0;
      return`<td><input type="number" class="wh-input${v>0?' has-val':''}${isOver&&v>0?' overloaded':''}" min="0" max="${dev.cap}" value="${v||''}" placeholder="0"
        onchange="setWhCell(${p.id},${ai},'${w}',+this.value||0)"
        onfocus="this.select()"
        style="width:46px"></td>`;
    }).join('');
    return`<tr>
      <td class="wh-proj-name">
        <span style="display:inline-flex;align-items:center;gap:5px">
          <span style="width:8px;height:8px;border-radius:50%;background:${p.color};flex-shrink:0;display:inline-block"></span>
          <span style="font-size:12px;font-weight:500">${p.name}</span>
        </span>
      </td>
      ${cells}
    </tr>`;
  }).join('');

  // capacity summary row
  const capCells=activeWeeks.map(w=>{
    const eff=effectiveCap(dev,w);
    const used=devTotalHoursInWeek(dev,t.projects,w);
    const rem=eff-used;
    const cls=rem<0?'wh-cap-over':rem===0?'wh-cap-ok':'wh-cap-cell';
    const frac=absFrac(w,getAbs(dev));
    const absNote=frac>0?` <span style="color:#f0a040;font-size:10px">(${Math.round(frac*5)}d ab.)</span>`:'';
    return`<td><span class="${cls}" style="font-size:11px">${used}/${eff}h</span>${absNote}</td>`;
  }).join('');

  return`<div style="margin-top:10px">
    <div class="sec-label" style="margin-top:0">Stunden pro Woche & Projekt</div>
    <div style="overflow-x:auto">
      <table class="wh-table">
        <thead><tr><th class="wh-proj-hdr">Projekt</th>${hdrCells}</tr></thead>
        <tbody>
          ${projRows}
          <tr class="wh-cap-row"><td style="font-size:11px;color:#888">Gesamt / Kapazität</td>${capCells}</tr>
        </tbody>
      </table>
    </div>
  </div>`;
}

function renderDevTab(){
  const t=td();
  document.getElementById('tab-entwickler').innerHTML=t.devs.map(d=>{
    return`<div class="card">
      <div class="card-header">
        <div class="avatar" style="background:${d.color};color:${d.ctxt}">${initials(d.name)}</div>
        <input type="text" class="name-input" value="${d.name}" onchange="devById(${d.id}).name=this.value;saveAndRender()">
        <div style="display:flex;align-items:center;gap:6px;margin-left:auto">
          <span class="fl">Kapazität:</span>
          <input type="number" min="1" max="80" value="${d.cap}" onchange="devById(${d.id}).cap=+this.value;saveAndRender()" style="width:56px">
          <span class="fl">h/Wo</span>
        </div>
        <button class="del" onclick="td().devs=td().devs.filter(x=>x.id!=${d.id});saveAndRenderNow()">×</button>
      </div>
      ${renderWeeklyMatrix(d)}
      ${renderMiniCal(d.id)}
    </div>`;
  }).join('')+`<button class="btn btn-add" onclick="addDev()" style="margin-top:4px">+ Entwickler</button>`;
}

// ── Event handlers ────────────────────────────────────────────────────────────
function setWhCell(pid,ai,wStart,v){
  const p=projById(pid);if(!p||!p.assignments[ai])return;
  setWH(p.assignments[ai],wStart,v);
  saveAndRender();
}
function pasgn(pid,ai,k,v){const p=projById(pid);if(p&&p.assignments[ai]){p.assignments[ai][k]=v;}saveAndRenderNow();}
function rmAsgn(pid,ai){const p=projById(pid);if(p)p.assignments.splice(ai,1);saveAndRenderNow();}
function addAsgn(pid){
  const p=projById(pid);const t=td();
  if(p)p.assignments.push({devId:t.devs[0]?.id||1,startDate:today(),endDate:addWeeks(today(),4),weeklyHours:{}});
  saveAndRenderNow();
}
function toggleAbs(did,ds){
  const dev=devById(did);if(!dev)return;
  const abs=getAbs(dev);const i=abs.indexOf(ds);
  if(i>=0)abs.splice(i,1);else abs.push(ds);
  saveAndRenderNow();
}
function calPrev(did){const cs=getCalState(did);cs.m--;if(cs.m<0){cs.m=11;cs.y--;}renderDevTab();}
function calNext(did){const cs=getCalState(did);cs.m++;if(cs.m>11){cs.m=0;cs.y++;}renderDevTab();}
function addDev(){const t=td();t.dc++;const ci=t.devs.length%AVT_BG.length;t.devs.push({id:t.dc,name:'Dev '+t.dc,cap:40,absences:[],color:AVT_BG[ci],ctxt:AVT_TX[ci]});saveAndRenderNow();}
function addProj(){const t=td();t.pc++;t.projects.push({id:t.pc,name:'Projekt '+t.pc,color:COLORS[t.pc%COLORS.length],deadline:'',totalHours:0,assignments:[]});saveAndRenderNow();}

function renderAll(){renderGanttTab();renderProjTab();renderDevTab();}
function saveAndRender(){renderAll();scheduleSave(activeTeam);}
function saveAndRenderNow(){renderAll();saveNow(activeTeam);}

loadAll();
</script>
